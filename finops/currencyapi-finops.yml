description: >-
  FinOps view of CurrencyAPI spend. CurrencyAPI is billed as a flat monthly (or
  discounted annual) subscription per tier - Free $0 (300 requests), Small
  $9.99 (15,000 requests), Medium $39.99 (600,000 requests), Large $79.99
  (1,700,000 requests), Custom by contract - rather than pure pay-per-call.
  The cost driver to manage is therefore plan right-sizing: matching your
  monthly successful-request volume and required rate freshness (daily, hourly,
  or 60-second updates) to the cheapest sufficient tier. Only successful calls
  consume quota, and the free /status endpoint exposes month and grace quota
  counters for programmatic spend/usage monitoring.
notes: >-
  Annual billing discounts each paid tier roughly 20% (Small $7.99, Medium
  $31.99, Large $63.99 per month). Overages are supported on the Large plan;
  a grace quota provides bounded headroom. Cache latest-rate responses and use
  the range endpoint (one call for a whole time series) to cut request volume.
