meters:
- name: api_requests
  description: Successful API requests per month, counted against the plan quota (300 to 1,700,000 by tier).
  unit: requests
  aggregation: sum
  dimensions:
  - account
  - api_key
  - endpoint
- name: grace_quota_usage
  description: Overage requests consumed from the grace quota reported by the /status endpoint.
  unit: requests
  aggregation: sum
  dimensions:
  - account
- name: plan_subscription
  description: Flat monthly or annual subscription fee for the selected tier.
  unit: months
  aggregation: sum
  dimensions:
  - account
  - plan
principles:
- name: Visibility
  description: Poll the free /status endpoint and read the X-RateLimit-* response headers to track month and grace quota consumption in near real time.
- name: Allocation
  description: Use separate API keys (2 on Medium, 5 on Large) per application or team so request volume maps to internal cost centers.
- name: Optimization
  description: Cache latest rates for your refresh interval, request only needed currencies via the currencies parameter, and use the range endpoint to fetch a whole time series in one call instead of many historical calls.
- name: Accountability
  description: Review monthly usage against the plan quota and right-size the tier - upgrade before hitting 429s or downgrade when sustained usage sits well below the allowance.
